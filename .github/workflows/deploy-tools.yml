name: Deploy Tool Scripts

on:
  push:
    branches: [master]
    paths:
      - 'tools/**'
      - '.github/workflows/deploy-tools.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key_enc
          chmod 600 ~/.ssh/deploy_key_enc
          ssh-keygen -p -f ~/.ssh/deploy_key_enc -P "${{ secrets.SSH_PASSPHRASE }}" -N ""
          mv ~/.ssh/deploy_key_enc ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy tool scripts
        run: |
          rsync -az -e "ssh -i ~/.ssh/deploy_key" \
            tools/twenty_crm_enhanced.sh \
            tools/linkedin_extractor.py \
            tools/linkedin_message_extractor.sh \
            root@${{ secrets.DEPLOY_HOST }}:/root/.nanobot/tools/

      - name: Restart nanobot
        run: |
          ssh -i ~/.ssh/deploy_key root@${{ secrets.DEPLOY_HOST }} "systemctl restart nanobot"

      - name: Verify nanobot is running
        run: |
          sleep 3
          ssh -i ~/.ssh/deploy_key root@${{ secrets.DEPLOY_HOST }} "systemctl is-active nanobot" || {
            echo "Nanobot failed to start!"
            ssh -i ~/.ssh/deploy_key root@${{ secrets.DEPLOY_HOST }} "journalctl -u nanobot --lines 20 --no-pager"
            exit 1
          }
          echo "Nanobot is running."

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key
