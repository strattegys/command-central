name: Deploy Tool Scripts

on:
  push:
    branches: [master]
    paths:
      - 'tools/**'
      - '.github/workflows/deploy-tools.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy tool scripts
        run: |
          rsync -az \
            tools/twenty_crm_enhanced.sh \
            tools/linkedin_extractor.py \
            tools/linkedin_message_extractor.sh \
            root@${{ secrets.DEPLOY_HOST }}:/root/.nanobot/tools/

      - name: Restart nanobot
        run: |
          ssh root@${{ secrets.DEPLOY_HOST }} "systemctl restart nanobot"

      - name: Verify nanobot is running
        run: |
          sleep 3
          ssh root@${{ secrets.DEPLOY_HOST }} "systemctl is-active nanobot" || {
            echo "Nanobot failed to start!"
            ssh root@${{ secrets.DEPLOY_HOST }} "journalctl -u nanobot --lines 20 --no-pager"
            exit 1
          }
          echo "Nanobot is running."
