name: Deploy Command Central

on:
  push:
    branches: [master]
    paths:
      - 'web/**'
      - 'agents/**'
      - 'Caddyfile'
      - 'docker-compose.yml'
      - '.dockerignore'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: cd web && npm ci

      - name: TypeScript check
        run: cd web && npx tsc --noEmit

      - name: Production build (matches Docker builder)
        run: cd web && npx next build

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Set up SSH
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Build and deploy with Docker Compose
        run: |
          ssh -i ~/.ssh/deploy_key root@${{ secrets.DEPLOY_HOST }} bash -s <<'EOF'
          set -e
          cd /opt/agent-tim

          # Pull latest code
          echo "Pulling latest code..."
          git fetch origin master
          git reset --hard origin/master

          if [ ! -f web/.env.local ]; then
            echo "ERROR: web/.env.local is missing. Create it on the server (copy from web/.env.local.example and fill secrets)."
            exit 1
          fi

          # Build and restart containers
          echo "Building Docker images..."
          docker compose build --no-cache web

          echo "Starting containers..."
          docker compose up -d

          echo "Waiting for server to start..."
          sleep 8
          EOF

      - name: Health check
        run: |
          ssh -i ~/.ssh/deploy_key root@${{ secrets.DEPLOY_HOST }} bash -s <<'EOF'
          if curl -sf http://localhost:3001 > /dev/null 2>&1; then
            echo "✓ Health check passed — Command Central is running."
          else
            echo "✗ Health check FAILED"
            echo ""
            echo "Container logs:"
            docker compose -f /opt/agent-tim/docker-compose.yml logs --tail=30 web
            exit 1
          fi
          EOF

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key
