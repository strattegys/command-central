name: Deploy Command Central

on:
  push:
    branches: [master]
    paths:
      - 'web/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: cd web && npm ci

      - name: TypeScript check
        run: cd web && npx tsc --noEmit

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Set up SSH
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Build and deploy on server
        run: |
          ssh -i ~/.ssh/deploy_key root@${{ secrets.DEPLOY_HOST }} bash -s <<'EOF'
          set -e
          cd /opt/agent-tim

          # Pull latest code
          git fetch origin master
          git reset --hard origin/master
          cd web

          # Install dependencies
          npm ci

          # Build standalone output
          npm run build

          # Copy static assets into standalone (required by Next.js standalone mode)
          cp -r public .next/standalone/public
          cp -r .next/static .next/standalone/.next/static
          cp .env.local .next/standalone/.env.local 2>/dev/null || true

          # Restart
          pm2 restart command-central --update-env || pm2 start ecosystem.config.js
          pm2 save
          EOF

      - name: Health check
        run: |
          sleep 5
          ssh -i ~/.ssh/deploy_key root@${{ secrets.DEPLOY_HOST }} "curl -sf http://localhost:3001 > /dev/null" || {
            echo "Health check failed!"
            ssh -i ~/.ssh/deploy_key root@${{ secrets.DEPLOY_HOST }} "pm2 logs command-central --lines 30 --nostream"
            exit 1
          }
          echo "Health check passed - Command Central is running."

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key
