# Local development stack
# Two-step local data platform (CRM Postgres on droplet):
#   1) Start SSH tunnel — scripts/crm-db-tunnel.ps1 or scripts/crm-db-tunnel.sh
#      (forwards 0.0.0.0:5433 -> droplet:5432 so Docker can reach it via host.docker.internal)
#   2) docker compose -f docker-compose.dev.yml up
## Hot reload works via volume mount of web/ directory.
# Runs on http://localhost:3001

services:
  web:
    image: node:20-alpine
    working_dir: /app
    # --webpack: Turbopack (Next 16 default) often misses file changes on Windows + bind mounts; webpack + polling below is reliable
    command: sh -c "npm install && rm -rf .next && npx next dev --hostname 0.0.0.0 --port 3001 --webpack"
    ports:
      - "3001:3001"
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
      - ./agents:/agents
    env_file: ./web/.env.local
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - AGENT_ROOT=/agents
      # Always reach Postgres on the host (SSH tunnel to droplet, or local Postgres). Overrides CRM_DB_HOST=127.0.0.1 in .env.local — that value only works for `npm run dev` on the host, not inside this container.
      - CRM_DB_HOST=host.docker.internal
      # Windows + bind mounts: file watchers often miss saves; force polling so edits hit Next dev
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    tty: true

volumes:
  web_node_modules:
