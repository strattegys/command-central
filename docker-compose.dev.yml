# Local development stack
# Usage: docker compose -f docker-compose.dev.yml up
#
# Hot reload works via volume mount of web/ directory.
# Runs on http://localhost:3001

services:
  web:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && rm -rf .next && npx next dev --hostname 0.0.0.0 --port 3001"
    ports:
      - "3001:3001"
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
      - ./agents:/agents
    env_file: ./web/.env.local
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - AGENT_ROOT=/agents
      - CRM_DB_HOST=host.docker.internal
    tty: true

volumes:
  web_node_modules:
